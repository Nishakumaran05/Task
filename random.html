<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    #limit {
        color: red;
        font-size: 14px;
    }
</style>

<body>

    <!-- random number -->

    <div class="random">
        <h1 id="values">1</h1>
        <span id="limit"></span> <br> <br>
        <button onclick="random()">Click</button>
        <button onclick="resetbtn()">Reset</button>
    </div>

</body>

<script>

    debugger
    var value = document.getElementById("values")
    var limittxt = document.getElementById("limit")
    var count = 0
    function random() {
        if (count >= 5) {
            limittxt.textContent = "You have reached the max limit.. reset and try again"
            return
        }

        value.textContent = Math.floor((Math.random() * 100) + 1)
        count++
    }

    function resetbtn() {
        value.innerText = 1
        count = 0
        limittxt.innerText = " "
        alert("Reset Successfully !! Now you can start generate")
    }

</script>

</html>
